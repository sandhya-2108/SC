<!DOCTYPE html>
<html>
<head>
<body>
<h3>
Print Array</h3>
<input type="text" id="arr" placeholder="Enter values">
<button onclick="show()">Show
</button>
<p id="out"></p>
<script>
function show(){
var a=
document.getElementBY Id ("arr").value.split(",");
document.getElementBY Id ("out").innerHTML=a.join(" ");
}
</script>
</body>
</html>
