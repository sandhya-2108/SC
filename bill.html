<html>
<head>                                                                                                                                                                                                                 	<title>Electricity Bill</title>
</head>
<body>
	<h2>Electricity Bill</h2>
	<script>
		var units = parseInt(prompt("Enter number of units:"));
		var bill = 0;
		
		if(units <= 100)
		{
			bill = units*3;
		}
		else if(units <= 200)
		{
			bill = (100*3) + ((units - 100)*5);
		}
		else
		{
			bill = (100*3) + (100*5)+((units - 200)*7);
		}
		document.write("Unit consumed: " +units+ "<br>");
		document.write("Total Bill: " +bill);
	</script>
</body>
</html>
