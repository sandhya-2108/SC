<html>
<head>
	<title>Grade Card</title>
</head>
<body>
	<script>
		alert("JavaScript");
		
		let marks = Number(prompt("Enter marks"));
		if(marks >= 90){
			document.write("A grade");
			console.log("eligible");
		} else if(marks >= 80) {
			console.log("not eligible");
		}
		else{
			document.write("grade fail");
			}
	</script>
	
</body>
</html>
